[pytest]
# The inspect harness (tier 3) runs the real chain on tests/inspect_inputs/*.
# It needs pdflatex and prints a human-readable dump (run `pytest -s`); skip it
# with `pytest -m "not inspect"` for a pure-fast run.
#
# The e2e (tier 3) replays recorded fixture slots through the REAL orchestrator
# (run -> tailor_one -> chain -> ship + log) with no network; the lone `live` test
# hits the real Anthropic API and is hand-run (it self-skips without a key).
# Add `--io` to any run to dump each subject's full prompt/response/tool I/O.
# `live` is deselected by default (see conftest.pytest_collection_modifyitems) so an
# ordinary `pytest` never bills the metered API even with ANTHROPIC_API_KEY exported;
# run the smoke by hand with `pytest -m live`. The guard is a collection hook, not an
# `addopts = -m ...`, so it composes with any `-m` filter (e.g. `-m "not inspect"`).
markers =
    inspect: real-chain inspect harness; needs pdflatex, eyeball the -s output
    live: real-Anthropic smoke; needs ANTHROPIC_API_KEY + pdflatex (hand-run, self-skips)
